<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor - React</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeIn 0.6s ease-in;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            margin-bottom: 30px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-title {
            color: #667eea;
            font-size: 1.8em;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 3px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.95em;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: all 0.3s ease;
            background-color: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select.form-control {
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .result-number {
            font-size: 2.5em;
            margin-top: 10px;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        .predictions-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .predictions-table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .predictions-table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .predictions-table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #333;
        }

        .predictions-table tbody tr {
            transition: background-color 0.3s ease;
        }

        .predictions-table tbody tr:hover {
            background-color: #f8f9fa;
        }

        .predictions-table tbody tr.best-model {
            background-color: #d4edda;
            font-weight: bold;
        }

        .predictions-table tbody tr.best-model td {
            color: #155724;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 600;
            margin-left: 10px;
            background-color: #28a745;
            color: white;
        }

        .prediction-score {
            font-size: 1.3em;
            color: #667eea;
            font-weight: bold;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-size: 1.2em;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 25px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [formData, setFormData] = useState({
                gender: '',
                ethnicity: '',
                parental_level_of_education: '',
                lunch: '',
                test_preparation_course: '',
                reading_score: '',
                writing_score: ''
            });

            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleChange = (e) => {
                setFormData({
                    ...formData,
                    [e.target.name]: e.target.value
                });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);

                try {
                    const response = await fetch('http://localhost:5000/api/predict', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(formData)
                    });

                    const data = await response.json();

                    if (data.success) {
                        setResult(data);
                    } else {
                        setError(data.error || 'Prediction failed');
                    }
                } catch (err) {
                    setError('Failed to connect to server. Make sure Flask app is running on port 5000.');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="app-container">
                    <div className="header">
                        <h1>🎓 Student Performance Predictor</h1>
                        <p>Powered by Machine Learning & React</p>
                    </div>

                    <div className="card">
                        <h2 className="form-title">📝 Student Information</h2>

                        {error && (
                            <div className="error">
                                ⚠️ {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit}>
                            <div className="form-grid">
                                <div className="form-group">
                                    <label className="form-label">Gender</label>
                                    <select
                                        className="form-control"
                                        name="gender"
                                        value={formData.gender}
                                        onChange={handleChange}
                                        required
                                    >
                                        <option value="">Select Gender</option>
                                        <option value="male">Male</option>
                                        <option value="female">Female</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Race or Ethnicity</label>
                                    <select
                                        className="form-control"
                                        name="ethnicity"
                                        value={formData.ethnicity}
                                        onChange={handleChange}
                                        required
                                    >
                                        <option value="">Select Ethnicity</option>
                                        <option value="group A">Group A</option>
                                        <option value="group B">Group B</option>
                                        <option value="group C">Group C</option>
                                        <option value="group D">Group D</option>
                                        <option value="group E">Group E</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Parental Level of Education</label>
                                    <select
                                        className="form-control"
                                        name="parental_level_of_education"
                                        value={formData.parental_level_of_education}
                                        onChange={handleChange}
                                        required
                                    >
                                        <option value="">Select Parent Education</option>
                                        <option value="associate's degree">Associate's Degree</option>
                                        <option value="bachelor's degree">Bachelor's Degree</option>
                                        <option value="high school">High School</option>
                                        <option value="master's degree">Master's Degree</option>
                                        <option value="some college">Some College</option>
                                        <option value="some high school">Some High School</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Lunch Type</label>
                                    <select
                                        className="form-control"
                                        name="lunch"
                                        value={formData.lunch}
                                        onChange={handleChange}
                                        required
                                    >
                                        <option value="">Select Lunch Type</option>
                                        <option value="free/reduced">Free/Reduced</option>
                                        <option value="standard">Standard</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Test Preparation Course</label>
                                    <select
                                        className="form-control"
                                        name="test_preparation_course"
                                        value={formData.test_preparation_course}
                                        onChange={handleChange}
                                        required
                                    >
                                        <option value="">Select Test Course</option>
                                        <option value="none">None</option>
                                        <option value="completed">Completed</option>
                                    </select>
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Reading Score (0-100)</label>
                                    <input
                                        className="form-control"
                                        type="number"
                                        name="reading_score"
                                        value={formData.reading_score}
                                        onChange={handleChange}
                                        min="0"
                                        max="100"
                                        required
                                    />
                                </div>

                                <div className="form-group">
                                    <label className="form-label">Writing Score (0-100)</label>
                                    <input
                                        className="form-control"
                                        type="number"
                                        name="writing_score"
                                        value={formData.writing_score}
                                        onChange={handleChange}
                                        min="0"
                                        max="100"
                                        required
                                    />
                                </div>
                            </div>

                            <button type="submit" className="btn" disabled={loading}>
                                {loading ? '🔄 Predicting...' : '🎯 Predict Math Score'}
                            </button>
                        </form>
                    </div>

                    {loading && (
                        <div className="loading">
                            ⏳ Analyzing data with all ML models...
                        </div>
                    )}

                    {result && (
                        <>
                            <div className="result-card">
                                <div>🎯 Predicted Math Score</div>
                                <div className="result-number">{result.prediction.toFixed(2)}</div>
                                <div style={{fontSize: '0.5em', marginTop: '10px', opacity: 0.9}}>
                                    Using: {result.best_model}
                                </div>
                            </div>

                            {result.all_predictions && result.all_predictions.length > 0 && (
                                <div className="card">
                                    <h2 className="form-title">📊 All Models Prediction Comparison</h2>
                                    <div className="table-container">
                                        <table className="predictions-table">
                                            <thead>
                                                <tr>
                                                    <th>Rank</th>
                                                    <th>Algorithm</th>
                                                    <th>Predicted Score</th>
                                                    <th>Model R² Score</th>
                                                    <th>Accuracy %</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {result.all_predictions.map((pred, index) => (
                                                    <tr key={index} className={index === 0 ? 'best-model' : ''}>
                                                        <td>{index + 1}</td>
                                                        <td>
                                                            {pred.name}
                                                            {index === 0 && <span className="badge">✓ Used</span>}
                                                        </td>
                                                        <td className="prediction-score">{pred.prediction.toFixed(2)}</td>
                                                        <td>{pred.r2_score.toFixed(4)}</td>
                                                        <td>{pred.accuracy_percentage}%</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
